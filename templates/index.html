<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书文案生成器 Pro v4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #f8b500 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; color: white; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; opacity: 0.9; }
        .input-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255,107,157,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,157,0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #555;
        }
        .btn-secondary:hover:not(:disabled) { background: #e8e8e8; }
        .tips-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .tip-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .tip-icon { font-size: 1.5rem; }
        .results-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            display: none;
        }
        .result-card {
            background: #fafafa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b9d;
        }
        .result-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .style-badge, .category-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .style-badge {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
        }
        .category-badge {
            background: #e8f4f8;
            color: #2c3e50;
        }
        .result-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #444;
            font-family: inherit;
            background: none;
            border: none;
            padding: 0;
        }
        .btn-copy {
            padding: 10px 20px;
            background: white;
            border: 2px solid #ff6b9d;
            color: #ff6b9d;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-copy:hover {
            background: #ff6b9d;
            color: white;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 小红书文案生成器 Pro</h1>
            <p class="subtitle">AI驱动 · 真实原创 · 不再模板化</p>
        </header>

        <main>
            <div class="input-section">
                <div class="form-group">
                    <label for="product">产品名称 *</label>
                    <input type="text" id="product" placeholder="例如：丹东草莓、iPhone 15、海底捞..." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="style">文案风格</label>
                        <select id="style">
                            <option value="authentic">真实体验型 - 像朋友聊天</option>
                            <option value="professional">专业测评型 - 数据说话</option>
                            <option value="emotional">情感共鸣型 - 走心温暖</option>
                            <option value="humorous">幽默风趣型 - 轻松搞笑</option>
                            <option value="minimal">极简高级型 - 克制留白</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="keywords">关键词（可选）</label>
                        <input type="text" id="keywords" placeholder="例如：送礼、性价比、学生党">
                    </div>
                </div>

                <div class="button-group">
                    <button id="generateBtn" class="btn-primary">
                        <span class="btn-text">✨ 生成文案</span>
                    </button>
                    <button id="batchBtn" class="btn-secondary">
                        🎲 批量生成3条
                    </button>
                </div>
            </div>

            <div class="tips-section">
                <h3>💡 使用提示</h3>
                <div class="tips-grid">
                    <div class="tip-card"><span class="tip-icon">🍓</span><span>水果：丹东草莓、车厘子、榴莲...</span></div>
                    <div class="tip-card"><span class="tip-icon">🍜</span><span>美食：海底捞、日料、下午茶...</span></div>
                    <div class="tip-card"><span class="tip-icon">🏠</span><span>日用：收纳盒、洗衣液、面膜...</span></div>
                    <div class="tip-card"><span class="tip-icon">📱</span><span>数码：蓝牙耳机、充电宝...</span></div>
                </div>
            </div>

            <div id="results" class="results-section">
                <h3>🎯 生成结果</h3>
                <div id="resultsList"></div>
            </div>
        </main>

        <footer>
            <p>Powered by AI · 每次生成都是原创内容</p>
        </footer>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const batchBtn = document.getElementById('batchBtn');
        const resultsSection = document.getElementById('results');
        const resultsList = document.getElementById('resultsList');

        const styleMap = {
            'authentic': '真实体验型',
            'professional': '专业测评型',
            'emotional': '情感共鸣型',
            'humorous': '幽默风趣型',
            'minimal': '极简高级型'
        };

        async function generateContent(isBatch = false) {
            const product = document.getElementById('product').value.trim();
            const style = document.getElementById('style').value;
            const keywords = document.getElementById('keywords').value.trim();

            if (!product) { alert('请输入产品名称'); return; }

            generateBtn.disabled = true;
            batchBtn.disabled = true;

            try {
                const endpoint = isBatch ? '/api/batch' : '/api/generate';
                const body = isBatch ? { product, count: 3 } : { product, style, keywords };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.error) { alert(data.error); return; }

                resultsSection.style.display = 'block';
                resultsList.innerHTML = '';

                const results = isBatch ? data.results : [data];
                
                results.forEach((result) => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="result-header">
                            <span class="style-badge">${styleMap[result.style] || result.style}</span>
                            <span class="category-badge">${result.category}</span>
                        </div>
                        <pre class="result-content">${result.content}</pre>
                        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #e8e8e8;">
                            <button class="btn-copy" onclick="copyText(this, '${encodeURIComponent(result.content)}')">
                                📋 复制文案
                            </button>
                        </div>
                    `;
                    resultsList.appendChild(card);
                });

                resultsSection.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert('生成失败，请重试');
                console.error(error);
            } finally {
                generateBtn.disabled = false;
                batchBtn.disabled = false;
            }
        }

        async function copyText(btn, encodedText) {
            const text = decodeURIComponent(encodedText);
            try {
                await navigator.clipboard.writeText(text);
                btn.textContent = '✅ 已复制';
                setTimeout(() => { btn.textContent = '📋 复制文案'; }, 2000);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✅ 已复制';
                setTimeout(() => { btn.textContent = '📋 复制文案'; }, 2000);
            }
        }

        generateBtn.addEventListener('click', () => generateContent(false));
        batchBtn.addEventListener('click', () => generateContent(true));
        document.getElementById('product').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateContent(false);
        });
    </script>
</body>
</html>
